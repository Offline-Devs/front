name: noshirvani

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noshirvani
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noshirvani"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend/backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/noshirvani?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-access-secret-change-before-deployment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-refresh-secret-change-before-deployment}
      JWT_ACCESS_TTL: 3600
      JWT_REFRESH_TTL: 1296000
      OTP_PROVIDER: mock
      GIN_MODE: release
      UPLOAD_PATH: /uploads
      SERVER_ADDR: :8080
      CORS_ORIGINS: http://localhost,http://127.0.0.1
      ADMIN_PHONES: ${ADMIN_PHONES:-09123456789}
    volumes:
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Noshirvani Academy}
        NEXT_PUBLIC_APP_SHORT_NAME: ${NEXT_PUBLIC_APP_SHORT_NAME:-Noshirvani}
        NEXT_PUBLIC_APP_DESCRIPTION:
          ${NEXT_PUBLIC_APP_DESCRIPTION:-Exam analysis and academic consulting platform}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      API_BASE_URL: http://backend:8080
      API_TIMEOUT_MS: 15000
      LOG_LEVEL: info
      PROFILE_UPLOAD_MAX_MB: 10
      DOCUMENT_UPLOAD_MAX_MB: 50
      MULTIPLE_UPLOAD_MAX_FILES: 10
      BFF_SESSION_COOKIE_NAME: noshirvani_session
      BFF_SESSION_COOKIE_SECURE: "false"
      BFF_SESSION_COOKIE_SAME_SITE: lax
      BFF_SESSION_MAX_AGE_SECONDS: 1296000
      BFF_SESSION_SECRET: ${BFF_SESSION_SECRET:-local-bff-session-secret-change-before-deploy}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 15
    expose:
      - "3000"
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
