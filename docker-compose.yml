services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-آکادمی نوشیروانی}
        NEXT_PUBLIC_APP_SHORT_NAME: ${NEXT_PUBLIC_APP_SHORT_NAME:-نوشیروانی}
        NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-سامانه مدیریت آزمون و مشاوره تحصیلی آکادمی نوشیروانی}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api/v1}
        NEXT_PUBLIC_LOCALE: ${NEXT_PUBLIC_LOCALE:-fa-IR}
        NEXT_PUBLIC_TIME_ZONE: ${NEXT_PUBLIC_TIME_ZONE:-Asia/Tehran}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@noshirvaniacademy.com}
        NEXT_PUBLIC_SUPPORT_PHONE: ${NEXT_PUBLIC_SUPPORT_PHONE:-+981112345678}
        NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL:-}
        NEXT_PUBLIC_TELEGRAM_URL: ${NEXT_PUBLIC_TELEGRAM_URL:-}
        NEXT_PUBLIC_QUERY_STALE_TIME_MS: ${NEXT_PUBLIC_QUERY_STALE_TIME_MS:-60000}
        NEXT_PUBLIC_QUERY_GC_TIME_MS: ${NEXT_PUBLIC_QUERY_GC_TIME_MS:-600000}
        NEXT_PUBLIC_QUERY_RETRY_COUNT: ${NEXT_PUBLIC_QUERY_RETRY_COUNT:-1}
        NEXT_PUBLIC_QUERY_REFETCH_ON_WINDOW_FOCUS: ${NEXT_PUBLIC_QUERY_REFETCH_ON_WINDOW_FOCUS:-false}
        NEXT_PUBLIC_OTP_RESEND_SECONDS: ${NEXT_PUBLIC_OTP_RESEND_SECONDS:-120}
        NEXT_PUBLIC_DEFAULT_PAGE_SIZE: ${NEXT_PUBLIC_DEFAULT_PAGE_SIZE:-20}
        NEXT_PUBLIC_PROFILE_UPLOAD_MAX_MB: ${NEXT_PUBLIC_PROFILE_UPLOAD_MAX_MB:-10}
        NEXT_PUBLIC_DOCUMENT_UPLOAD_MAX_MB: ${NEXT_PUBLIC_DOCUMENT_UPLOAD_MAX_MB:-50}
        NEXT_PUBLIC_MULTIPLE_UPLOAD_MAX_FILES: ${NEXT_PUBLIC_MULTIPLE_UPLOAD_MAX_FILES:-10}
        NEXT_PUBLIC_ENABLE_BLOG: ${NEXT_PUBLIC_ENABLE_BLOG:-true}
        NEXT_PUBLIC_ENABLE_CONTACT_PAGE: ${NEXT_PUBLIC_ENABLE_CONTACT_PAGE:-true}
        NEXT_PUBLIC_ENABLE_QUERY_DEVTOOLS: ${NEXT_PUBLIC_ENABLE_QUERY_DEVTOOLS:-false}
    environment:
      - NODE_ENV=production
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_BASE_URL=${API_BASE_URL:-http://host.docker.internal:8080}
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-15000}
      - BFF_SESSION_COOKIE_NAME=${BFF_SESSION_COOKIE_NAME:-noshirvani_session}
      - BFF_SESSION_COOKIE_DOMAIN=${BFF_SESSION_COOKIE_DOMAIN:-}
      - BFF_SESSION_COOKIE_SECURE=${BFF_SESSION_COOKIE_SECURE:-auto}
      - BFF_SESSION_COOKIE_SAME_SITE=${BFF_SESSION_COOKIE_SAME_SITE:-lax}
      - BFF_SESSION_MAX_AGE_SECONDS=${BFF_SESSION_MAX_AGE_SECONDS:-1296000}
      - BFF_SESSION_SECRET=${BFF_SESSION_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3000"
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
