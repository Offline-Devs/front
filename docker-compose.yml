name: noshirvani

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noshirvani
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noshirvani"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend/backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/noshirvani?sslmode=disable
      REDIS_ADDR: redis:6379
      ENVIRONMENT: ${BACKEND_ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET:-local-access-secret-change-before-deployment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-refresh-secret-change-before-deployment}
      JWT_ACCESS_TTL: 3600
      JWT_REFRESH_TTL: 1296000
      OTP_PROVIDER: ${OTP_PROVIDER:-mock}
      EXPOSE_MOCK_OTP: ${EXPOSE_MOCK_OTP:-true}
      SMSIR_API_KEY: ${SMSIR_API_KEY:-}
      SMSIR_TEMPLATE_ID: ${SMSIR_TEMPLATE_ID:-}
      GIN_MODE: release
      UPLOAD_PATH: /uploads
      SERVER_ADDR: :8080
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    entrypoint: ["/bin/sh", "/opt/normalize-admin-phones.sh"]
    volumes:
      - uploads:/uploads
      - ./docker/normalize-admin-phones.sh:/opt/normalize-admin-phones.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-آینده سبز}
        NEXT_PUBLIC_APP_SHORT_NAME: ${NEXT_PUBLIC_APP_SHORT_NAME:-آینده سبز}
        NEXT_PUBLIC_APP_DESCRIPTION:
          ${NEXT_PUBLIC_APP_DESCRIPTION:-پلتفرم تحلیل عملکرد درسی دانش آموزان کنکوری}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api/v1}
        NEXT_PUBLIC_LOCALE: ${NEXT_PUBLIC_LOCALE:-fa-IR}
        NEXT_PUBLIC_TIME_ZONE: ${NEXT_PUBLIC_TIME_ZONE:-Asia/Tehran}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@example.com}
        NEXT_PUBLIC_SUPPORT_PHONE: ${NEXT_PUBLIC_SUPPORT_PHONE:-+980000000000}
        NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL:-}
        NEXT_PUBLIC_TELEGRAM_URL: ${NEXT_PUBLIC_TELEGRAM_URL:-}
        NEXT_PUBLIC_QUERY_STALE_TIME_MS: ${NEXT_PUBLIC_QUERY_STALE_TIME_MS:-60000}
        NEXT_PUBLIC_QUERY_GC_TIME_MS: ${NEXT_PUBLIC_QUERY_GC_TIME_MS:-600000}
        NEXT_PUBLIC_QUERY_RETRY_COUNT: ${NEXT_PUBLIC_QUERY_RETRY_COUNT:-1}
        NEXT_PUBLIC_QUERY_REFETCH_ON_WINDOW_FOCUS: ${NEXT_PUBLIC_QUERY_REFETCH_ON_WINDOW_FOCUS:-false}
        NEXT_PUBLIC_OTP_RESEND_SECONDS: ${NEXT_PUBLIC_OTP_RESEND_SECONDS:-120}
        NEXT_PUBLIC_DEFAULT_PAGE_SIZE: ${NEXT_PUBLIC_DEFAULT_PAGE_SIZE:-20}
        NEXT_PUBLIC_PROFILE_UPLOAD_MAX_MB: ${NEXT_PUBLIC_PROFILE_UPLOAD_MAX_MB:-10}
        NEXT_PUBLIC_DOCUMENT_UPLOAD_MAX_MB: ${NEXT_PUBLIC_DOCUMENT_UPLOAD_MAX_MB:-50}
        NEXT_PUBLIC_MULTIPLE_UPLOAD_MAX_FILES: ${NEXT_PUBLIC_MULTIPLE_UPLOAD_MAX_FILES:-10}
        NEXT_PUBLIC_ENABLE_BLOG: ${NEXT_PUBLIC_ENABLE_BLOG:-true}
        NEXT_PUBLIC_ENABLE_CONTACT_PAGE: ${NEXT_PUBLIC_ENABLE_CONTACT_PAGE:-true}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      API_BASE_URL: http://backend:8080
      API_TIMEOUT_MS: 15000
      LOG_LEVEL: info
      PROFILE_UPLOAD_MAX_MB: 10
      DOCUMENT_UPLOAD_MAX_MB: 50
      MULTIPLE_UPLOAD_MAX_FILES: 10
      BFF_SESSION_COOKIE_NAME: noshirvani_session
      BFF_SESSION_COOKIE_SECURE: ${BFF_SESSION_COOKIE_SECURE:-false}
      BFF_SESSION_COOKIE_SAME_SITE: lax
      BFF_SESSION_MAX_AGE_SECONDS: 1296000
      BFF_SESSION_SECRET: ${BFF_SESSION_SECRET:-local-bff-session-secret-change-before-deploy}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 15
    expose:
      - "3000"
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
